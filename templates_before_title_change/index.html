<!DOCTYPE html>
<html>
<head>
    <title>Dellicar Noleggio Gestionale</title>
</head>

<body>

{% if session.get("logged") %}
<style>
.dellicar-userbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    z-index:9999;
    background:#111;
    color:#fff;
    padding:10px 16px;
    font-family:Arial,sans-serif;
    font-size:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.25);
}
.dellicar-userbar a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
    margin-left:12px;
}
body{ padding-top:52px !important; }
@media print{
    .dellicar-userbar{ display:none !important; }
    body{ padding-top:0 !important; }
}
</style>
<div class="dellicar-userbar">
    <div><strong>DELLICAR Gestionale</strong></div>
    <div>Utente: {{ session.get("username","-") }} ({{ session.get("role","-") }}) <a href="/logout">Logout</a></div>
</div>
{% endif %}


<h1>Dellicar Noleggio Gestionale</h1>
<h3>DELLICAR AUTOMOTIVE</h3>

<h2>Cerca targa</h2>

<form action="/search_rentals" method="get">
    <input type="text" name="plate" placeholder="Inserisci targa">
    <input type="date" name="date">
    <button type="submit">Cerca</button>
</form>

<br>

<a href="/clients">Clienti</a><br>
<a href="/vehicles">Veicoli</a><br>
<a href="/rentals">Noleggi</a>

</body>
</html>
